<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | A&M Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f4f6f9;
            --bg-surface: #ffffff;
            --bg-dark-blue: #0f1c2e;
            --text-light: #f8f9fa;
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --border-light: #dfe6e9;
            --accent: #0984e3;
            --radius: 15px;
            --shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); padding-bottom: 40px;}
        
        /* الهيدر */
        header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 20px; 
            background-color: var(--bg-dark-blue); 
            box-shadow: var(--shadow); 
            margin-bottom: 25px;
        }
        .header-title { font-size: 1.2rem; font-weight: bold; color: var(--text-light); display: flex; align-items: center; gap: 10px;}
        .back-btn { text-decoration: none; color: var(--text-light); background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; transition: 0.3s;}
        .back-btn:hover { background: var(--accent); }

        .admin-container { max-width: 700px; margin: 0 auto; background: var(--bg-surface); padding: 25px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border-light);}
        
        .section-title { font-size: 1.2rem; border-bottom: 2px solid var(--border-light); padding-bottom: 10px; margin-bottom: 20px; color: var(--text-dark); display: flex; justify-content: space-between; align-items: center;}
        
        /* نموذج الإضافة والتعديل */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full-width { grid-column: span 2; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } }
        
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-dark);}
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--border-light); border-radius: 10px; font-size: 0.95rem; background: var(--bg-main); outline: none; transition: 0.3s;}
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 5px rgba(9, 132, 227, 0.3); }
        
        .btn-submit { width: 100%; padding: 14px; background: var(--text-dark); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .btn-submit:hover { background: #000; transform: translateY(-2px);}
        .btn-cancel { background: #e74c3c; display: none; }

        /* قائمة المنتجات */
        .product-list { margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .product-item { background: var(--bg-main); border: 1px solid var(--border-light); padding: 12px; border-radius: 12px; text-align: center; transition: 0.3s; }
        .product-item.is-hidden { opacity: 0.6; filter: grayscale(80%); border-style: dashed; }
        .product-item img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border-light);}
        .product-title { font-size: 1rem; font-weight: bold; margin-bottom: 5px;}
        .product-qty { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;}
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-action { border: none; padding: 8px; border-radius: 8px; cursor: pointer; color: white; font-size: 0.85rem; transition: 0.3s;}
        .btn-action:hover { opacity: 0.8; }
        .btn-edit { background: var(--accent); grid-column: span 2; margin-bottom: 5px;}
        .btn-delete { background: #e74c3c; }
        .btn-hide { background: #f39c12; }
        .btn-show { background: #27ae60; }
    </style>
</head>
<body>

    <header>
        <div class="header-title"><i class="fa-solid fa-user-gear"></i> لوحة تحكم الإدارة</div>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-store"></i> العودة للمتجر</a>
    </header>

    <div class="admin-container">
        
        <div class="section-title">
            <span id="form-title">إضافة منتج جديد</span>
            <button id="btn-cancel-edit" class="btn-action btn-cancel" onclick="cancelEdit()"><i class="fa-solid fa-times"></i> إلغاء التعديل</button>
        </div>

        <div class="form-grid">
            <div class="form-group full-width">
                <label>اسم المنتج</label>
                <input type="text" id="p-name" class="form-control" placeholder="مثال: تيشرت صيفي">
            </div>

            <div class="form-group">
                <label>القسم</label>
                <select id="p-category" class="form-control">
                    <option value="رجالي">قسم رجالي</option>
                    <option value="حريمي">قسم حريمي</option>
                    <option value="أطفال">قسم أطفال</option>
                    <option value="عروض">عروض خاصة</option>
                </select>
            </div>

            <div class="form-group">
                <label>الكمية المتاحة بالمخزن</label>
                <input type="number" id="p-qty" class="form-control" placeholder="مثال: 50" min="0">
            </div>

            <div class="form-group full-width">
                <label>صورة المنتج (اتركها فارغة في حالة التعديل إذا لم ترد تغييرها)</label>
                <input type="file" id="p-image" class="form-control" accept="image/*">
            </div>

            <div class="form-group">
                <label>المقاسات (افصل بينها بفاصلة , )</label>
                <input type="text" id="p-sizes" class="form-control" placeholder="S, M, L, XL">
            </div>

            <div class="form-group">
                <label>الألوان (افصل بينها بفاصلة , )</label>
                <input type="text" id="p-colors" class="form-control" placeholder="أسود, كحلي, فضي">
            </div>

            <div class="form-group full-width">
                <label>أماكن التوصيل المتاحة</label>
                <input type="text" id="p-delivery" class="form-control" value="جميع المحافظات">
            </div>
        </div>

        <button id="btn-submit" class="btn-submit" onclick="saveProduct()"><i class="fa-solid fa-upload"></i> رفع المنتج للمتجر</button>

        <h3 class="section-title" style="margin-top: 40px;">إدارة المنتجات المضافة</h3>
        <div class="product-list" id="admin-product-list"></div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('am_products')) ||[];
        let editingId = null; // متغير لحفظ ID المنتج الجاري تعديله

        // دالة لضغط حجم الصورة تلقائياً لعدم استهلاك مساحة التخزين
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.7)); // جودة 70%
                }
            }
        }

        // دالة الحفظ (تستخدم للإضافة والتعديل معاً)
        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const category = document.getElementById('p-category').value;
            const qty = document.getElementById('p-qty').value;
            const sizes = document.getElementById('p-sizes').value.split(',').map(s=>s.trim()).filter(s=>s);
            const colors = document.getElementById('p-colors').value.split(',').map(c=>c.trim()).filter(c=>c);
            const delivery = document.getElementById('p-delivery').value;
            const fileInput = document.getElementById('p-image');

            if(!name || !qty || sizes.length === 0 || colors.length === 0) {
                alert("يرجى ملء جميع البيانات الأساسية (الاسم، الكمية، المقاسات، والألوان)!");
                return;
            }

            if(!editingId && fileInput.files.length === 0) {
                alert("يرجى إرفاق صورة للمنتج الجديد!");
                return;
            }

            const saveData = (imageBase64) => {
                if (editingId) {
                    // وضع التعديل
                    const index = products.findIndex(p => p.id === editingId);
                    products[index].name = name;
                    products[index].category = category;
                    products[index].qty = parseInt(qty);
                    products[index].sizes = sizes;
                    products[index].colors = colors;
                    products[index].delivery = delivery;
                    if(imageBase64) products[index].img = imageBase64; // تحديث الصورة فقط لو تم رفع صورة جديدة
                    
                    alert("تم تعديل المنتج بنجاح!");
                    cancelEdit(); // إرجاع النموذج لوضع الإضافة
                } else {
                    // وضع إضافة جديد
                    const newProduct = {
                        id: Date.now(),
                        name: name,
                        category: category,
                        qty: parseInt(qty),
                        sizes: sizes,
                        colors: colors,
                        delivery: delivery,
                        img: imageBase64,
                        hidden: false
                    };
                    products.push(newProduct);
                    alert("تم رفع المنتج بنجاح!");
                    clearForm();
                }

                localStorage.setItem('am_products', JSON.stringify(products));
                renderAdminProducts();
            };

            if (fileInput.files.length > 0) {
                compressImage(fileInput.files[0], saveData);
            } else {
                saveData(null); // تمرير null للصورة في وضع التعديل إذا لم يرفع صورة جديدة
            }
        }

        // وضع منتج في وضع التعديل
        function editProduct(id) {
            const p = products.find(x => x.id === id);
            editingId = p.id;
            
            document.getElementById('form-title').innerText = "تعديل المنتج: " + p.name;
            document.getElementById('form-title').style.color = "var(--accent)";
            document.getElementById('btn-submit').innerHTML = '<i class="fa-solid fa-save"></i> حفظ التعديلات';
            document.getElementById('btn-cancel-edit').style.display = 'inline-block';

            document.getElementById('p-name').value = p.name;
            document.getElementById('p-category').value = p.category;
            document.getElementById('p-qty').value = p.qty;
            document.getElementById('p-sizes').value = p.sizes.join(', ');
            document.getElementById('p-colors').value = p.colors.join(', ');
            document.getElementById('p-delivery').value = p.delivery;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // إلغاء التعديل
        function cancelEdit() {
            editingId = null;
            document.getElementById('form-title').innerText = "إضافة منتج جديد";
            document.getElementById('form-title').style.color = "var(--text-dark)";
            document.getElementById('btn-submit').innerHTML = '<i class="fa-solid fa-upload"></i> رفع المنتج للمتجر';
            document.getElementById('btn-cancel-edit').style.display = 'none';
            clearForm();
        }

        function clearForm() {
            document.getElementById('p-name').value = '';
            document.getElementById('p-qty').value = '';
            document.getElementById('p-image').value = '';
            document.getElementById('p-sizes').value = '';
            document.getElementById('p-colors').value = '';
        }

        // عرض المنتجات
        function renderAdminProducts() {
            const list = document.getElementById('admin-product-list');
            list.innerHTML = products.map((p, i) => `
                <div class="product-item ${p.hidden ? 'is-hidden' : ''}">
                    <img src="${p.img}">
                    <div class="product-title">${p.name}</div>
                    <div class="product-qty">الكمية المتاحة: <strong>${p.qty}</strong></div>
                    
                    <button class="btn-action btn-edit" onclick="editProduct(${p.id})">
                        <i class="fa-solid fa-pen"></i> تعديل
                    </button>
                    <div class="action-btns">
                        <button class="btn-action ${p.hidden ? 'btn-show' : 'btn-hide'}" onclick="toggleHide(${p.id})">
                            ${p.hidden ? '<i class="fa-solid fa-eye"></i> إظهار' : '<i class="fa-solid fa-eye-slash"></i> إخفاء'}
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteProduct(${p.id})">
                            <i class="fa-solid fa-trash"></i> حذف
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // إخفاء / إظهار
        function toggleHide(id) {
            const index = products.findIndex(p => p.id === id);
            products[index].hidden = !products[index].hidden;
            localStorage.setItem('am_products', JSON.stringify(products));
            renderAdminProducts();
        }

        // حذف نهائي
        function deleteProduct(id) {
            if(confirm("هل أنت متأكد من حذف هذا المنتج نهائياً من المتجر؟")) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('am_products', JSON.stringify(products));
                renderAdminProducts();
            }
        }

        // التهيئة المبدئية
        renderAdminProducts();
    </script>
</body>
</html>
