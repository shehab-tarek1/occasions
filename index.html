<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&M Store</title>
    <meta name="description" content="تسوق أحدث الملابس بأفضل الأسعار.">
    <meta property="og:title" content="A&M Store | متجر الأزياء الأول">
    <meta property="og:description" content="تشكيلة رائعة من أحدث الموديلات، اطلب الآن بأفضل الأسعار.">
    <meta property="og:image" content="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_512,h_512/v1776992294/lsxv7x8xmgbrq0ht4yy7.jpg">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f4f6f9; 
            --bg-surface: #ffffff;
            --bg-dark-blue: #0f1c2e; 
            --text-light: #f8f9fa; 
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --border-light: #dfe6e9;
            --accent: #0984e3;
            --silver: #b2bec3;
            --radius: 20px;
            --shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center;}

        /* نظام الإشعارات (Toast) الجديد */
        .toast-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #27ae60;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            transition: top 0.4s ease-in-out;
        }
        .toast-notification.show { top: 20px; }

        header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background-color: var(--bg-dark-blue); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;}
        .header-right { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--text-light); object-fit: cover; }
        .site-name { font-size: 1.05rem; font-weight: bold; color: var(--text-light); } 
        .header-left { display: flex; gap: 15px; align-items: center; }
        .cart-icon { font-size: 1.3rem; color: var(--text-light); cursor: pointer; position: relative; transition: 0.3s; margin-left: 5px;}
        .cart-icon:hover { color: var(--accent); }
        .cart-count { position: absolute; top: -6px; right: -8px; background: #e74c3c; color: white; border-radius: 50%; font-size: 0.7rem; padding: 2px 6px; font-weight: bold;}

        main { padding: 20px 15px; width: 100%; max-width: 800px; flex: 1; }
        .hidden { display: none !important; }

        .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .back-arrow { display: inline-flex; align-items: center; gap: 8px; color: var(--bg-dark-blue); font-weight: bold; cursor: pointer; padding: 8px 15px; background: var(--bg-surface); border-radius: 25px; box-shadow: var(--shadow); font-size: 0.85rem; transition: 0.3s;}
        .top-title-text { font-size: 0.85rem; font-weight: bold; color: var(--text-muted); background: var(--bg-surface); padding: 8px 15px; border-radius: 25px; box-shadow: var(--shadow); border: 1px solid var(--border-light);}

        .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .category-card { background-color: var(--bg-surface); border-radius: var(--radius); overflow: hidden; text-align: center; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.3s; border: 1px solid var(--border-light); }
        .category-card img { width: 100%; height: 130px; object-fit: cover; object-position: top center; display: block;}
        .category-card h3 { background-color: var(--bg-dark-blue); color: var(--text-light); padding: 10px; font-size: 0.95rem; margin: 0; border-top: 1px solid rgba(255,255,255,0.1);}

        .inner-product-card { position: relative; background: var(--bg-surface); border-radius: var(--radius); overflow: hidden; text-align: center; box-shadow: var(--shadow); cursor: pointer; border: 1px solid var(--border-light); transition: 0.3s; flex-shrink: 0; scroll-snap-align: start; }
        .inner-product-card .img-container { position: relative; width: 100%; height: 130px; }
        .inner-product-card img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; border-bottom: 1px solid var(--border-light); transition: 0.3s;}
        .inner-product-card h3 { padding: 10px 8px 4px; font-size: 0.85rem; color: var(--text-dark); margin: 0; }
        .inner-product-card p { padding: 0 8px 10px; font-size: 0.7rem; color: var(--text-muted); margin: 0; }
        
        .badge-discount { position: absolute; top: 8px; left: 8px; background-color: #e74c3c; color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .badge-outofstock { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0, 0, 0, 0.75); color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; z-index: 5; white-space: nowrap; }
        .img-outofstock { opacity: 0.4; filter: grayscale(50%); }

        .slider-section { background-color: var(--bg-surface); padding: 18px 15px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 25px;}
        .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px solid var(--border-light); padding-bottom: 8px;}
        .slider-header h2 { font-size: 1.05rem; color: var(--bg-dark-blue); margin: 0; }
        .slider-nav { display: flex; gap: 8px; }
        .slider-arrow { width: 24px; height: 24px; border-radius: 50%; background: var(--bg-main); color: var(--bg-dark-blue); display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 0.7rem; border: 1px solid var(--border-light);}
        .slider-container { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 12px; padding-bottom: 5px; scroll-snap-type: x mandatory;}
        .slider-container::-webkit-scrollbar { display: none; } 
        .slider-container .inner-product-card { width: calc(50% - 6px); }

        .share-icon { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.95); color: var(--bg-dark-blue); width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; font-size: 0.8rem;}
        
        footer { background-color: var(--bg-dark-blue); color: var(--text-light); border-radius: 25px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin: 10px auto 25px auto; width: calc(100% - 30px); max-width: 760px; border: 1px solid rgba(255,255,255,0.1); }
        footer .footer-logo { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--text-light); margin-bottom: 10px; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .social-links a { color: var(--text-light); font-size: 1.4rem; text-decoration: none;}

        .details-image-wrapper { width: 100%; max-width: 300px; margin: 0 auto 10px auto; overflow: hidden; position: relative;}
        .details-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border-light); }
        .details-slider::-webkit-scrollbar { display: none; }
        .details-slider img { flex: 0 0 100%; width: 300px; height: 300px; object-fit: cover; object-position: top center; scroll-snap-align: center; }
        .slider-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; margin-bottom: 15px;}
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--silver); transition: 0.3s; }
        .dot.active { background: var(--bg-dark-blue); transform: scale(1.2); }

        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; padding: 20px;}
        .lightbox img { width: 100%; max-width: 400px; max-height: 80vh; border-radius: 15px; object-fit: contain; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .close-lightbox { color: white; font-size: 2rem; margin-bottom: 20px; cursor: pointer; }

        .info-bar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-surface); padding: 12px 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border-light); font-size: 0.95rem;}
        .options-section { background: var(--bg-surface); padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border-light);}
        .option-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top:8px;}
        .badge { padding: 6px 15px; border: 1px solid var(--border-light); border-radius: 20px; background: var(--bg-main); color: var(--text-muted); font-size: 0.85rem;}
        .btn { width: 100%; padding: 12px; border: none; border-radius: 15px; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; color: white; transition: 0.3s; margin-top: 15px;}
        .btn-primary { background: var(--text-dark); }
        .btn-cart { background: var(--bg-surface); color: var(--bg-dark-blue); border: 2px solid var(--bg-dark-blue); }
        .btn-whatsapp { background: #25D366; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: bold; color: var(--text-dark); font-size: 0.9rem;}
        .form-control { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border-light); font-size: 0.95rem; background: var(--bg-main); outline: none;}
    </style>
</head>
<body>

    <!-- رسالة الإشعار (Toast) -->
    <div id="toast" class="toast-notification">
        <i class="fa-solid fa-circle-check"></i> <span id="toast-msg">تمت الإضافة للسلة بنجاح</span>
    </div>

    <header>
        <div class="header-right" onclick="resetAndNavigate('home')">
            <img src="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_512,h_512/v1776992294/lsxv7x8xmgbrq0ht4yy7.jpg" class="logo-img" alt="Logo">
            <div class="site-name">A&M Store</div>
        </div>
        <div class="header-left">
            <div class="cart-icon" onclick="navigate('cart')">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cart-count-badge">0</span>
            </div>
        </div>
    </header>

    <div class="lightbox" id="lightbox">
        <i class="fa-solid fa-xmark close-lightbox" onclick="closeLightbox()"></i>
        <img id="lightbox-img" src="">
    </div>

    <main id="home" class="hidden">
        <div class="categories-grid">
            <div class="category-card" onclick="openCategory('رجالي')">
                <img src="https://images.pexels.com/photos/1043474/pexels-photo-1043474.jpeg?auto=compress&cs=tinysrgb&w=400">
                <h3>قسم رجالي</h3>
            </div>
            <div class="category-card" onclick="openCategory('حريمي')">
                <img src="https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=400">
                <h3>قسم حريمي</h3>
            </div>
            <div class="category-card" onclick="openCategory('أطفال')">
                <img src="https://images.pexels.com/photos/1620760/pexels-photo-1620760.jpeg?auto=compress&cs=tinysrgb&w=400">
                <h3>قسم أطفال</h3>
            </div>
            <div class="category-card" onclick="openCategory('عروض')">
                <img src="https://images.pexels.com/photos/994517/pexels-photo-994517.jpeg?auto=compress&cs=tinysrgb&w=400">
                <h3>عروض خاصة</h3>
            </div>
        </div>

        <div class="slider-section">
            <div class="slider-header">
                <h2>أحدث الإضافات</h2>
                <div class="slider-nav">
                    <div class="slider-arrow" onclick="scrollSlider('right')"><i class="fa-solid fa-chevron-right"></i></div>
                    <div class="slider-arrow" onclick="scrollSlider('left')"><i class="fa-solid fa-chevron-left"></i></div>
                </div>
            </div>
            <div class="slider-container" id="latest-products-slider"></div>
        </div>
    </main>

    <main id="category" class="hidden">
        <div class="top-bar">
            <div class="back-arrow" onclick="goBack()"><i class="fa-solid fa-arrow-right"></i> رجوع</div>
            <span id="category-title" class="top-title-text">القسم</span>
        </div>
        <div class="categories-grid" id="category-products"></div>
    </main>

    <main id="details" class="hidden">
        <div class="top-bar">
            <div class="back-arrow" onclick="goBack()"><i class="fa-solid fa-arrow-right"></i> رجوع</div>
            <span class="top-title-text">التفاصيل</span>
        </div>
        <div id="product-details-content"></div>
    </main>

    <main id="order-form" class="hidden">
        <div class="top-bar">
            <div class="back-arrow" onclick="goBack()"><i class="fa-solid fa-arrow-right"></i> إلغاء</div>
            <span class="top-title-text">تجهيز الطلب</span>
        </div>
        <div class="slider-section" style="margin-top: 10px;">
            <div id="order-form-content"></div>
        </div>
    </main>

    <main id="cart" class="hidden">
        <div class="top-bar">
            <div class="back-arrow" onclick="goBack()"><i class="fa-solid fa-arrow-right"></i> رجوع للتبضع</div>
            <span class="top-title-text">سلة الطلبات</span>
        </div>
        <div class="slider-section" style="margin-top: 10px;">
            <div id="cart-items"></div>
            <button class="btn btn-whatsapp" onclick="checkoutCart()"><i class="fa-brands fa-whatsapp"></i> إرسال كل الطلبات واتساب</button>
        </div>
    </main>

    <footer id="main-footer">
        <img src="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_512,h_512/v1776992294/lsxv7x8xmgbrq0ht4yy7.jpg" class="footer-logo" alt="Logo">
        <h2 style="color: var(--text-light); font-size:1.1rem;">A&M Store</h2>
        <div style="margin-top: 5px; color: #cbd5e1; font-size: 0.85rem;">
            <p><i class="fa-solid fa-location-dot" style="color: var(--accent); margin-left: 5px;"></i> العنوان: مصر</p>
            <p style="margin-top: 5px;"><i class="fa-solid fa-user-tie" style="color: var(--accent); margin-left: 5px;"></i> البائع: A&M Manager</p>
        </div>
        <div class="social-links">
            <a href="https://www.instagram.com/_a_m_2026?igsh=bW1xdGJwdDJ4MXVt&utm_source=qr" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1CYGfrYJda/?mibextid=wwXIfr" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.tiktok.com/@_a_m_2026?_r=1&_t=ZS-95n2dpfIOxB" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://wa.me/201141226046" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </footer>

    <script>
        // دالة إظهار الإشعارات (Toast)
        function showToast(message, color = "#27ae60") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.style.backgroundColor = color;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        if (window.location.href.includes('index.html')) {
            let cleanUrl = window.location.href.replace('index.html', '');
            window.history.replaceState({}, document.title, cleanUrl);
        }

        function generateShortCode() {
            return String(Math.floor(Math.random() * 1000) + 1).padStart(4, '0');
        }

        let products = JSON.parse(localStorage.getItem('am_products')) ||[];
        products = products.map(p => {
            if(!p.images) p.images =[p.img]; 
            if(!p.shortCode) p.shortCode = generateShortCode();
            if(!p.description) p.description = "خامة ممتازة ومريحة وتصميم عصري."; 
            return p;
        });

        let cart = JSON.parse(localStorage.getItem('am_cart')) ||[];
        const SELLER_PHONE = "201141226046";
        
        let historyStack =['home'];

        function resetAndNavigate(pageId) {
            historyStack = [pageId];
            window.history.replaceState({ page: pageId }, "");
            navigateUI(pageId);
        }

        function navigate(pageId, pushToHistory = true) {
            if(pushToHistory && historyStack[historyStack.length - 1] !== pageId) {
                historyStack.push(pageId);
                window.history.pushState({ page: pageId }, "");
            }
            navigateUI(pageId);
        }

        function navigateUI(pageId) {
            const pages =['home', 'category', 'details', 'order-form', 'cart'];
            pages.forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const footer = document.getElementById('main-footer');
            if(pageId === 'home' || pageId === 'cart') {
                footer.style.display = 'block';
            } else {
                footer.style.display = 'none';
            }

            if(pageId === 'home') renderHomeSlider();
            if(pageId === 'cart') renderCart();
        }

        window.addEventListener('popstate', (e) => {
            if (historyStack.length > 1) {
                historyStack.pop(); 
                let previousPage = historyStack[historyStack.length - 1]; 
                navigateUI(previousPage);
            } else {
                navigateUI('home');
            }
        });

        function goBack() {
            if (historyStack.length > 1) {
                window.history.back();
            } else {
                resetAndNavigate('home');
            }
        }

        function shareProduct(event, id) {
            event.stopPropagation();
            const p = products.find(x => x.id === id);
            if(!p) return;

            const baseUrl = window.location.href.split('?')[0].split('#')[0];
            const shareUrl = `${baseUrl}?p=${p.shortCode}`;
            const shareTitle = `A&M Store | ${p.name}`;
            const shareText = `✨ شاهد هذا المنتج الرائع من A&M Store!\n🛍️ ${p.name}\n🔖 كود المنتج: ${p.shortCode}\n🛒 للطلب، اضغط على الرابط التالي:\n`;

            if (navigator.share) {
                navigator.share({ title: shareTitle, text: shareText, url: shareUrl })
                .catch((error) => console.log('إلغاء المشاركة'));
            } else {
                navigator.clipboard.writeText(shareText + shareUrl).then(() => {
                    showToast("تم نسخ رابط المنتج بنجاح! 🔗", "#0984e3"); // إشعار أزرق
                });
            }
        }

        function updateCartBadge() { document.getElementById('cart-count-badge').innerText = cart.length; }

        function generateProductCardHTML(p) {
            let displayImg = p.images ? p.images[0] : p.img;
            let discountBadge = (p.isOffer && p.discount) ? `<div class="badge-discount">خصم ${p.discount}</div>` : '';
            let outOfStockBadge = (p.qty <= 0) ? `<div class="badge-outofstock">انتهت الكمية</div>` : '';
            let imgClass = (p.qty <= 0) ? 'img-outofstock' : '';

            return `
                <div class="inner-product-card" onclick="openProduct(${p.id})">
                    ${discountBadge}
                    <div class="share-icon" onclick="shareProduct(event, ${p.id})" title="مشاركة المنتج"><i class="fa-solid fa-share-nodes"></i></div>
                    <div class="img-container">
                        <img src="${displayImg}" class="${imgClass}">
                        ${outOfStockBadge}
                    </div>
                    <h3>${p.name}</h3>
                    <p>${p.category}</p>
                </div>
            `;
        }

        function renderHomeSlider() {
            const slider = document.getElementById('latest-products-slider');
            slider.innerHTML = '';
            let visibleProducts = products.filter(p => !p.hidden);
            if(visibleProducts.length === 0) return slider.innerHTML = '<p style="font-size:0.85rem; color:var(--text-muted)">لا توجد منتجات حالياً.</p>';
            
            visibleProducts.slice().reverse().slice(0, 10).forEach(p => {
                slider.innerHTML += generateProductCardHTML(p);
            });
        }

        function scrollSlider(direction) {
            const slider = document.getElementById('latest-products-slider');
            const scrollAmount = slider.clientWidth / 2;
            if(direction === 'right') { slider.scrollBy({ left: scrollAmount, behavior: 'smooth' }); } 
            else { slider.scrollBy({ left: -scrollAmount, behavior: 'smooth' }); }
        }

        function openCategory(catName) {
            document.getElementById('category-title').innerText = catName === 'عروض' ? 'عروض خاصة' : "قسم " + catName;
            const container = document.getElementById('category-products');
            container.innerHTML = '';
            
            let filtered = catName === 'عروض' ? products.filter(p => p.isOffer === true && !p.hidden) : products.filter(p => p.category === catName && !p.hidden);
            
            if(filtered.length === 0) {
                container.innerHTML = '<p style="grid-column: span 2; text-align:center; font-size:0.9rem; color:var(--text-muted)">لا توجد منتجات في هذا القسم حالياً.</p>';
            } else {
                filtered.forEach(p => { container.innerHTML += generateProductCardHTML(p); });
            }
            navigate('category');
        }

        function updateSliderDots(sliderElement) {
            const absScroll = Math.abs(sliderElement.scrollLeft);
            const index = Math.round(absScroll / sliderElement.clientWidth);
            const dots = sliderElement.parentElement.parentElement.querySelectorAll('.dot');
            dots.forEach((dot, i) => { dot.classList.toggle('active', i === index); });
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function openProduct(id, pushToHistory = true) {
            const p = products.find(x => x.id === id);
            
            let sizesHtml = p.sizes.map(s => `<span class="badge">${s}</span>`).join('');
            let colorsHtml = p.colors.map(c => `<span class="badge">${c}</span>`).join('');
            
            let imgsArray = p.images && p.images.length > 0 ? p.images.slice(0, 7) :[p.img];
            let sliderHtml = imgsArray.map(imgSrc => `<img src="${imgSrc}" onclick="openLightbox(this.src)">`).join('');
            let dotsHtml = imgsArray.map((_, i) => `<span class="dot ${i===0 ? 'active' : ''}"></span>`).join('');

            let orderBtnHTML = p.qty > 0 
                ? `<button class="btn btn-primary" onclick="prepareOrder(${p.id})"><i class="fa-solid fa-bolt"></i> اطلب الآن</button>`
                : `<button class="btn" style="background:#bdc3c7; color:#fff; cursor:not-allowed;"><i class="fa-solid fa-ban"></i> انتهت الكمية</button>`;

            document.getElementById('product-details-content').innerHTML = `
                <div class="details-image-wrapper">
                    <div class="details-slider" onscroll="updateSliderDots(this)">
                        ${sliderHtml}
                    </div>
                </div>
                ${imgsArray.length > 1 ? `<div class="slider-dots">${dotsHtml}</div>` : ''}

                <div class="info-bar">
                    <strong style="font-size:0.95rem;">${p.name}</strong> 
                    <span style="color:${p.qty > 0 ? 'var(--bg-dark-blue)' : '#e74c3c'}; font-weight:bold; font-size:0.85rem;">متاح: ${p.qty}</span>
                </div>

                <div class="options-section">
                    <div style="font-weight:bold; font-size:0.9rem; color:var(--text-dark); margin-bottom: 8px;">
                        <i class="fa-solid fa-file-lines" style="color:var(--accent);"></i> تفاصيل المنتج:
                    </div>
                    <p style="font-size:0.85rem; color:var(--text-muted); line-height: 1.6; margin: 0;">${p.description}</p>
                </div>

                <div class="options-section" style="font-size:0.85rem; color:var(--text-dark)">
                    <div style="margin-bottom: 10px;">
                        <i class="fa-solid fa-hashtag" style="color:var(--accent); width: 15px;"></i> <strong>كود المنتج:</strong> <span style="color:var(--bg-dark-blue); font-weight:bold;">${p.shortCode}</span>
                    </div>
                    <div><i class="fa-solid fa-location-dot" style="color:var(--accent); width: 15px;"></i> <strong>التوصيل:</strong> ${p.delivery}</div>
                </div>

                <div class="options-section">
                    <div style="font-weight:bold; font-size:0.9rem; color:var(--text-dark)">المقاسات المتوفرة:</div>
                    <div class="option-badges">${sizesHtml}</div>
                </div>
                <div class="options-section">
                    <div style="font-weight:bold; font-size:0.9rem; color:var(--text-dark)">الألوان المتوفرة:</div>
                    <div class="option-badges">${colorsHtml}</div>
                </div>
                
                ${orderBtnHTML}
            `;
            navigate('details', pushToHistory);
        }

        function prepareOrder(id) {
            const p = products.find(x => x.id === id);
            let displayImg = p.images ? p.images[0] : p.img;
            let sizeOptions = p.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
            let colorOptions = p.colors.map(c => `<option value="${c}">${c}</option>`).join('');

            document.getElementById('order-form-content').innerHTML = `
                <div style="display:flex; gap:12px; margin-bottom:15px; align-items:center; background:var(--bg-main); padding:10px; border-radius:12px;">
                    <img src="${displayImg}" style="width:60px; height:60px; border-radius:10px; object-fit:cover; object-position: top center;">
                    <div>
                        <strong style="font-size:0.95rem;">${p.name}</strong><br>
                        <small style="color:var(--text-muted); font-size:0.8rem;">المتاح: ${p.qty}</small>
                    </div>
                </div>
                <div class="form-group"><label>اختر المقاس:</label><select id="order-size" class="form-control">${sizeOptions}</select></div>
                <div class="form-group"><label>اختر اللون:</label><select id="order-color" class="form-control">${colorOptions}</select></div>
                <div class="form-group"><label>الكمية المطلوبة:</label><input type="number" id="order-qty" class="form-control" value="1" min="1" max="${p.qty}"></div>
                
                <hr style="border:0; border-top:1px solid var(--border-light); margin: 15px 0;">
                <button class="btn btn-cart" onclick="addFromFormToCart(${p.id})"><i class="fa-solid fa-cart-plus"></i> إضافة للسلة (لطلب المزيد)</button>
                <button class="btn btn-whatsapp" onclick="confirmDirectOrder(${p.id})"><i class="fa-brands fa-whatsapp"></i> تأكيد الطلب وإرسال واتساب</button>
            `;
            navigate('order-form');
        }

        function addFromFormToCart(id) {
            const p = products.find(x => x.id === id);
            let size = document.getElementById('order-size').value, color = document.getElementById('order-color').value, qty = parseInt(document.getElementById('order-qty').value);
            
            cart.push({ ...p, selSize: size, selColor: color, selQty: qty });
            localStorage.setItem('am_cart', JSON.stringify(cart));
            updateCartBadge(); 
            
            showToast("تمت الإضافة للسلة بنجاح! 🛒"); // الإشعار الذكي
            goBack(); 
        }

        function confirmDirectOrder(id) {
            const p = products.find(x => x.id === id);
            let size = document.getElementById('order-size').value, color = document.getElementById('order-color').value, qty = parseInt(document.getElementById('order-qty').value);
            
            const baseUrl = window.location.href.split('?')[0].split('#')[0];
            const productUrl = `${baseUrl}?p=${p.shortCode}`;
            
            let msg = `مرحباً A&M Store، أود طلب:\n\n🔖 كود المنتج: ${p.shortCode}\n🛍️ المنتج: ${p.name}\n📁 القسم: ${p.category}\n🎨 اللون: ${color}\n📏 المقاس: ${size}\n🔢 العدد: ${qty}\n\n🔗 رابط المنتج: ${productUrl}`;
            window.open(`https://wa.me/${SELLER_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function renderCart() {
            const c = document.getElementById('cart-items');
            c.innerHTML = cart.length ? cart.map((item, i) => `
                <div class="info-bar" style="margin-bottom:12px; padding: 10px;">
                    <img src="${item.images ? item.images[0] : item.img}" style="width:60px; height:60px; border-radius:10px; object-fit:cover; object-position: top center;">
                    <div style="flex:1; margin: 0 12px;">
                        <strong style="font-size:0.9rem;">${item.name}</strong><br>
                        <small style="color:var(--text-muted); font-size:0.75rem;">لون: ${item.selColor} | مقاس: ${item.selSize} | <strong style="color:var(--bg-dark-blue)">العدد: ${item.selQty}</strong></small>
                    </div>
                    <i class="fa-solid fa-trash" style="color:#e74c3c; cursor:pointer; font-size:1.1rem; padding:8px;" onclick="removeFromCart(${i})"></i>
                </div>`).join('') : '<p style="text-align:center; font-size:0.85rem; color:var(--text-muted)">السلة فارغة.</p>';
        }

        function removeFromCart(i) { 
            cart.splice(i, 1); 
            localStorage.setItem('am_cart', JSON.stringify(cart)); 
            updateCartBadge(); 
            renderCart(); 
            showToast("تم إزالة المنتج من السلة 🗑️", "#e74c3c"); // إشعار الحذف (لون أحمر)
        }
        
        function checkoutCart() {
            if(!cart.length) return;
            const baseUrl = window.location.href.split('?')[0].split('#')[0];
            let msg = `مرحباً A&M Store، هذا طلبي من السلة:\n\n` + cart.map((item, i) => {
                const productUrl = `${baseUrl}?p=${item.shortCode}`;
                return `${i+1}- ${item.name} (قسم: ${item.category})\n🔖 كود: ${item.shortCode}\n🎨 لون: ${item.selColor} / 📏 مقاس: ${item.selSize} / 🔢 عدد: ${item.selQty}\n🔗 الرابط: ${productUrl}`;
            }).join('\n\n-----------------\n\n');
            window.open(`https://wa.me/${SELLER_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateCartBadge();
            const urlParams = new URLSearchParams(window.location.search);
            const sharedCode = urlParams.get('p');
            
            window.history.replaceState({ page: 'home' }, "");

            if (sharedCode) {
                const targetProduct = products.find(x => x.shortCode === sharedCode);
                if (targetProduct) {
                    historyStack =['home', 'details'];
                    window.history.pushState({ page: 'details' }, "");
                    openProduct(targetProduct.id, false);
                    return;
                }
            }
            resetAndNavigate('home');
        });

    </script>
</body>
</html>
