<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إشعارات كلية التجارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass max-w-lg w-full rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-500">
        <!-- Header -->
        <div class="bg-indigo-700 p-8 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-3xl font-bold">بوابة الإشعارات 🚀</h1>
                <p class="opacity-80 mt-2">كلية التجارة - دفعة 2026</p>
            </div>
            <div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full -mr-16 -mt-16"></div>
        </div>

        <div class="p-8 space-y-6">
            <!-- API Configuration -->
            <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                <label class="block text-indigo-900 text-sm font-bold mb-2">رابط السيرفر (Cloud Shell):</label>
                <input type="text" id="apiUrl" 
                    placeholder="https://8080-cs-xxxxxx.cloudshell.dev"
                    class="w-full p-3 bg-white border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs font-mono text-indigo-700">
                <p class="text-[10px] text-indigo-400 mt-2">تأكد أن السيرفر يعمل (node server.js) قبل الإرسال</p>
            </div>

            <!-- Notification Content -->
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">عنوان التنبيه:</label>
                    <input type="text" id="title" placeholder="أدخل عنواناً جذاباً..."
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">محتوى الرسالة:</label>
                    <textarea id="body" rows="4" placeholder="اكتب تفاصيل الإشعار هنا..."
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                </div>
            </div>

            <!-- Action Button -->
            <button onclick="sendNotification()" id="mainBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-300 shadow-lg hover:shadow-indigo-200 active:scale-95 flex items-center justify-center space-x-3 space-x-reverse">
                <span id="btnText">إرسال للطلاب الآن</span>
                <svg id="loader" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-gray-400 text-xs">نظام إدارة المحتوى - شهاب طارق</p>
        </div>
    </div>

    <!-- Alert System -->
    <div id="alertBox" class="fixed top-5 right-5 left-5 md:left-auto md:w-96 p-4 rounded-2xl shadow-2xl transform translate-y-[-150%] transition-transform duration-500 flex items-center space-x-3 space-x-reverse z-50">
        <div id="alertIcon"></div>
        <div id="alertText" class="font-bold text-sm"></div>
    </div>

    <script>
        function showAlert(msg, type = 'success') {
            const box = document.getElementById('alertBox');
            const text = document.getElementById('alertText');
            
            box.className = `fixed top-5 right-5 left-5 md:left-auto md:w-96 p-4 rounded-2xl shadow-2xl transform transition-transform duration-500 flex items-center space-x-3 space-x-reverse z-50 ${type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`;
            text.textContent = msg;
            
            box.style.transform = 'translateY(0)';
            setTimeout(() => { box.style.transform = 'translateY(-150%)'; }, 4000);
        }

        async function sendNotification() {
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const apiUrl = document.getElementById('apiUrl').value.trim().replace(/\/$/, "");
            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;

            if (!apiUrl || !title || !body) {
                showAlert("برجاء ملء جميع الحقول المطلوبة", "error");
                return;
            }

            // UI State
            btn.disabled = true;
            btnText.textContent = "جاري معالجة الإرسال...";
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`${apiUrl}/send-broadcast`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, body })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`تم الإرسال بنجاح لـ ${data.count || 0} طالب ✅`);
                    document.getElementById('title').value = "";
                    document.getElementById('body').value = "";
                } else {
                    showAlert(data.error || "السيرفر واجه مشكلة في الإرسال", "error");
                }
            } catch (err) {
                console.error(err);
                showAlert("فشل الاتصال: تأكد من تشغيل السيرفر ومن صحة الرابط", "error");
            } finally {
                btn.disabled = false;
                btnText.textContent = "إرسال للطلاب الآن";
                loader.classList.add('hidden');
            }
        }

        // حفظ الرابط تلقائياً في المتصفح لتسهيل الاستخدام مستقبلاً
        const urlInput = document.getElementById('apiUrl');
        const savedUrl = localStorage.getItem('foc_api_url');
        if(savedUrl) urlInput.value = savedUrl;
        urlInput.addEventListener('input', () => localStorage.setItem('foc_api_url', urlInput.value));
    </script>
</body>
</html>
