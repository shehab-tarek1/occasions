<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&M Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f4f6f9;
            --bg-surface: #ffffff;
            --bg-dark-blue: #0f1c2e; /* أزرق غامق للهيدر والفوتر */
            --text-light: #f8f9fa; 
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --border-light: #dfe6e9;
            --accent: #0984e3;
            --silver: #b2bec3;
            --radius: 20px;
            --shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center;}

        /* الهيدر */
        header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 12px; /* تم تقليل الـ padding ليكون أقصى اليمين */
            background-color: var(--bg-dark-blue); 
            box-shadow: var(--shadow); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .header-right { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--text-light); object-fit: cover; }
        .site-name { font-size: 1.15rem; font-weight: bold; color: var(--text-light); } 
        .header-left { display: flex; gap: 15px; align-items: center; }
        .cart-icon { font-size: 1.4rem; color: var(--text-light); cursor: pointer; position: relative; transition: 0.3s; margin-left: 5px;}
        .cart-icon:hover { color: var(--accent); }
        .cart-count { position: absolute; top: -6px; right: -8px; background: #e74c3c; color: white; border-radius: 50%; font-size: 0.7rem; padding: 2px 6px; font-weight: bold;}

        main { padding: 20px 15px; width: 100%; max-width: 800px; flex: 1; }
        .hidden { display: none !important; }

        /* الشريط العلوي الجديد (التنقل + العنوان) */
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-arrow { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-weight: bold; cursor: pointer; padding: 8px 18px; background: var(--bg-surface); border-radius: 25px; box-shadow: var(--shadow); font-size: 0.95rem; transition: 0.3s;}
        .back-arrow:hover { transform: translateX(5px); background: var(--border-light); }
        .top-title-text { font-size: 0.95rem; font-weight: bold; color: var(--text-muted); background: var(--bg-surface); padding: 8px 18px; border-radius: 25px; box-shadow: var(--shadow); border: 1px solid var(--border-light);}

        /* الأقسام والبطاقات */
        .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .category-card { background-color: var(--bg-surface); border-radius: var(--radius); overflow: hidden; text-align: center; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.3s; border: 1px solid var(--border-light); }
        .category-card:hover { transform: translateY(-5px); border-color: var(--silver); }
        .category-card img { width: 100%; height: 130px; object-fit: cover; }
        .category-card h3 { padding: 12px; font-size: 1.05rem; color: var(--text-dark); }

        /* السلايدر */
        .slider-section { background-color: var(--bg-surface); padding: 20px 15px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 25px;}
        .slider-section h2 { margin-bottom: 15px; font-size: 1.15rem; border-bottom: 2px solid var(--border-light); padding-bottom: 8px; color: var(--text-dark);}
        .slider-container { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 15px; padding-bottom: 10px; }
        .slider-container::-webkit-scrollbar { height: 6px; }
        .slider-container::-webkit-scrollbar-thumb { background: var(--silver); border-radius: 10px; }
        .product-card { min-width: 140px; background: var(--bg-main); border-radius: var(--radius); padding: 10px; text-align: center; cursor: pointer; border: 1px solid var(--border-light); transition: 0.3s; }
        .product-card:hover { border-color: var(--accent); }
        .product-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 12px; }
        .product-card h4 { font-size: 0.95rem; margin-top: 10px; color: var(--text-dark); }

        /* الفوتر العائم */
        footer { 
            background-color: var(--bg-dark-blue); 
            color: var(--text-light);
            border-radius: 25px; 
            padding: 25px 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            margin: 10px auto 25px auto; 
            width: calc(100% - 30px); 
            max-width: 760px; 
            border: 1px solid #1a2f4c; 
        }
        footer .footer-logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--text-light); margin-bottom: 12px; }
        .social-links { display: flex; justify-content: center; gap: 25px; margin-top: 15px; }
        .social-links a { color: var(--text-light); font-size: 1.6rem; text-decoration: none; transition: 0.3s; }
        .social-links a:hover { color: var(--accent); transform: scale(1.1);}

        /* التفاصيل */
        /* تم تصغير ارتفاع الصورة لـ 260 بكسل */
        .product-image-main { width: 100%; border-radius: var(--radius); object-fit: cover; height: 260px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-light);}
        .info-bar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-surface); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: var(--shadow); border: 1px solid var(--border-light); font-size: 1rem;}
        .options-section { background: var(--bg-surface); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: var(--shadow); border: 1px solid var(--border-light);}
        .option-badges { display: flex; gap: 10px; flex-wrap: wrap; margin-top:10px;}
        .badge { padding: 8px 18px; border: 1px solid var(--border-light); border-radius: 20px; background: var(--bg-main); color: var(--text-muted); font-size: 0.9rem; cursor: default;}
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 15px; font-size: 1.05rem; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; color: white; transition: 0.3s; margin-top: 15px;}
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-primary { background: var(--text-dark); }
        .btn-cart { background: var(--bg-surface); color: var(--text-dark); border: 2px solid var(--border-light); }
        .btn-cart:hover { border-color: var(--accent); color: var(--accent); }
        .btn-whatsapp { background: #25D366; }

        /* نموذج الطلب */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--text-dark); font-size: 0.95rem;}
        .form-control { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-light); font-size: 1rem; background: var(--bg-main); outline: none; transition: 0.3s;}
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 5px rgba(9, 132, 227, 0.3); }

    </style>
</head>
<body>

    <header>
        <div class="header-right" onclick="resetAndNavigate('home')">
            <img src="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_512,h_512/v1776992294/lsxv7x8xmgbrq0ht4yy7.jpg" class="logo-img">
            <div class="site-name">A&M Store</div>
        </div>
        <div class="header-left">
            <div class="cart-icon" onclick="navigate('cart')">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cart-count-badge">0</span>
            </div>
        </div>
    </header>

    <main id="home">
        <div class="categories-grid">
            <div class="category-card" onclick="openCategory('رجالي')">
                <img src="https://images.pexels.com/photos/1043474/pexels-photo-1043474.jpeg?auto=compress&cs=tinysrgb&w=400">
                <h3>ملابس رجالي</h3>
            </div>
            <div class="category-card" onclick="openCategory('حريمي')">
                <img src="https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=400">
                <h3>ملابس حريمي</h3>
            </div>
            <div class="category-card" onclick="openCategory('أطفال')">
                <img src="https://images.pexels.com/photos/1620760/pexels-photo-1620760.jpeg?auto=compress&cs=tinysrgb&w=400">
                <h3>ملابس أطفال</h3>
            </div>
            <div class="category-card" onclick="openCategory('عروض')">
                <img src="https://images.pexels.com/photos/5625009/pexels-photo-5625009.jpeg?auto=compress&cs=tinysrgb&w=400">
                <h3>عروض خاصة</h3>
            </div>
        </div>

        <div class="slider-section">
            <h2>أحدث الإضافات</h2>
            <div class="slider-container" id="latest-products-slider"></div>
        </div>
    </main>

    <main id="category" class="hidden">
        <!-- شريط التنقل الجديد -->
        <div class="top-bar">
            <div class="back-arrow" onclick="goBack()"><i class="fa-solid fa-arrow-right"></i> رجوع</div>
            <span id="category-title" class="top-title-text">القسم</span>
        </div>
        <div class="categories-grid" id="category-products"></div>
    </main>

    <main id="details" class="hidden">
        <div class="top-bar">
            <div class="back-arrow" onclick="goBack()"><i class="fa-solid fa-arrow-right"></i> رجوع</div>
            <span class="top-title-text">التفاصيل</span>
        </div>
        <div id="product-details-content"></div>
    </main>

    <main id="order-form" class="hidden">
        <div class="top-bar">
            <div class="back-arrow" onclick="goBack()"><i class="fa-solid fa-arrow-right"></i> إلغاء</div>
            <span class="top-title-text">تجهيز الطلب</span>
        </div>
        <div class="slider-section" style="margin-top: 10px;">
            <div id="order-form-content"></div>
        </div>
    </main>

    <main id="cart" class="hidden">
        <div class="top-bar">
            <div class="back-arrow" onclick="goBack()"><i class="fa-solid fa-arrow-right"></i> رجوع للتبضع</div>
            <span class="top-title-text">سلة الطلبات</span>
        </div>
        <div class="slider-section" style="margin-top: 10px;">
            <div id="cart-items"></div>
            <button class="btn btn-whatsapp" onclick="checkoutCart()"><i class="fa-brands fa-whatsapp"></i> إرسال كل الطلبات واتساب</button>
        </div>
    </main>

    <footer>
        <img src="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_512,h_512/v1776992294/lsxv7x8xmgbrq0ht4yy7.jpg" class="footer-logo">
        <h2 style="color: var(--text-light);">A&M Store</h2>
        <div style="margin-top: 8px; color: #cbd5e1; font-size: 0.95rem;">
            <p>📍 العنوان: مصر</p>
            <p>👤 البائع: A&M Manager</p>
        </div>
        <div class="social-links">
            <a href="https://www.instagram.com/_a_m_2026?igsh=bW1xdGJwdDJ4MXVt&utm_source=qr" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1CYGfrYJda/?mibextid=wwXIfr" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.tiktok.com/@_a_m_2026?_r=1&_t=ZS-95n2dpfIOxB" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://wa.me/201141226046" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </footer>

    <script>
        const dummyData =[
            { id: 1, name: "بدلة كلاسيك إيطالي", category: "رجالي", qty: 10, sizes:["M","L","XL","XXL"], colors: ["أسود","كحلي داكن","رصاصي"], delivery: "القاهرة والإسكندرية", img: "https://images.pexels.com/photos/1043474/pexels-photo-1043474.jpeg?auto=compress&cs=tinysrgb&w=400", hidden: false },
            { id: 2, name: "فستان سهرة لامع", category: "حريمي", qty: 5, sizes:["S","M","L"], colors: ["فضي لامع","أسود ملكي"], delivery: "جميع المحافظات", img: "https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=400", hidden: false },
            { id: 3, name: "طقم أطفال صيفي", category: "أطفال", qty: 15, sizes:["سنتين","4 سنوات","6 سنوات"], colors: ["أبيض","أزرق سماوي"], delivery: "جميع المحافظات", img: "https://images.pexels.com/photos/1620760/pexels-photo-1620760.jpeg?auto=compress&cs=tinysrgb&w=400", hidden: false },
            { id: 4, name: "تيشيرت شبابي تريندي", category: "عروض", qty: 30, sizes:["M","L","XL"], colors:["أسود","أبيض"], delivery: "جميع المحافظات", img: "https://images.pexels.com/photos/5625009/pexels-photo-5625009.jpeg?auto=compress&cs=tinysrgb&w=400", hidden: false }
        ];

        if(!localStorage.getItem('am_products') || JSON.parse(localStorage.getItem('am_products')).length === 0) {
            localStorage.setItem('am_products', JSON.stringify(dummyData));
        }

        let products = JSON.parse(localStorage.getItem('am_products')) ||[];
        let cart = JSON.parse(localStorage.getItem('am_cart')) ||[];
        const SELLER_PHONE = "201141226046";
        let historyStack =['home'];

        function resetAndNavigate(pageId) {
            historyStack = [pageId];
            navigate(pageId, false);
        }

        function navigate(pageId, pushToHistory = true) {
            const pages =['home', 'category', 'details', 'order-form', 'cart'];
            pages.forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if(pushToHistory && historyStack[historyStack.length - 1] !== pageId) {
                historyStack.push(pageId);
            }

            if(pageId === 'home') renderHomeSlider();
            if(pageId === 'cart') renderCart();
        }

        function goBack() {
            if(historyStack.length > 1) {
                historyStack.pop(); 
                let previousPage = historyStack[historyStack.length - 1]; 
                navigate(previousPage, false);
            } else {
                navigate('home', false);
            }
        }

        function updateCartBadge() { document.getElementById('cart-count-badge').innerText = cart.length; }

        function renderHomeSlider() {
            const slider = document.getElementById('latest-products-slider');
            slider.innerHTML = '';
            let visibleProducts = products.filter(p => !p.hidden);
            
            if(visibleProducts.length === 0) {
                slider.innerHTML = '<p style="color:var(--text-muted)">لا توجد منتجات حالياً.</p>'; return;
            }
            visibleProducts.slice().reverse().slice(0, 5).forEach(p => {
                slider.innerHTML += `<div class="product-card" onclick="openProduct(${p.id})"><img src="${p.img}"><h4>${p.name}</h4></div>`;
            });
        }

        function openCategory(catName) {
            document.getElementById('category-title').innerText = "قسم " + catName;
            const container = document.getElementById('category-products');
            container.innerHTML = '';
            let filtered = products.filter(p => p.category === catName && !p.hidden);
            
            if(filtered.length === 0) container.innerHTML = '<p style="grid-column: span 2; text-align:center;">لا توجد منتجات في هذا القسم حالياً.</p>';
            filtered.forEach(p => {
                container.innerHTML += `<div class="category-card" onclick="openProduct(${p.id})"><img src="${p.img}"><h3>${p.name}</h3><p style="padding-bottom:12px; font-size:0.9rem; color:var(--text-muted)">المتاح: <strong>${p.qty}</strong></p></div>`;
            });
            navigate('category');
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            
            let sizesHtml = p.sizes.map(s => `<span class="badge">${s}</span>`).join('');
            let colorsHtml = p.colors.map(c => `<span class="badge">${c}</span>`).join('');

            document.getElementById('product-details-content').innerHTML = `
                <img src="${p.img}" class="product-image-main">
                <div class="info-bar">
                    <strong>${p.name}</strong> 
                    <span style="color:var(--accent); font-weight:bold;">متاح: ${p.qty} قطعة</span>
                </div>
                <div class="options-section">
                    <div style="font-weight:bold; font-size:1.05rem; color:var(--text-dark)">المقاسات المتوفرة:</div>
                    <div class="option-badges">${sizesHtml}</div>
                </div>
                <div class="options-section">
                    <div style="font-weight:bold; font-size:1.05rem; color:var(--text-dark)">الألوان المتوفرة:</div>
                    <div class="option-badges">${colorsHtml}</div>
                </div>
                <div class="options-section" style="font-size:0.95rem; color:var(--text-dark)">
                    📍 <strong>التوصيل:</strong> ${p.delivery}
                </div>
                
                <button class="btn btn-primary" style="margin-top:20px;" onclick="prepareOrder(${p.id})">
                    <i class="fa-solid fa-bolt"></i> اطلب الآن
                </button>
            `;
            navigate('details');
        }

        function prepareOrder(id) {
            const p = products.find(x => x.id === id);
            
            let sizeOptions = p.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
            let colorOptions = p.colors.map(c => `<option value="${c}">${c}</option>`).join('');

            document.getElementById('order-form-content').innerHTML = `
                <div style="display:flex; gap:15px; margin-bottom:20px; align-items:center; background:var(--bg-main); padding:10px; border-radius:12px;">
                    <img src="${p.img}" style="width:70px; height:70px; border-radius:10px; object-fit:cover;">
                    <div>
                        <strong style="font-size:1rem;">${p.name}</strong><br>
                        <small style="color:var(--text-muted)">المتاح في المخزن: ${p.qty}</small>
                    </div>
                </div>

                <div class="form-group">
                    <label>اختر المقاس:</label>
                    <select id="order-size" class="form-control">${sizeOptions}</select>
                </div>

                <div class="form-group">
                    <label>اختر اللون:</label>
                    <select id="order-color" class="form-control">${colorOptions}</select>
                </div>

                <div class="form-group">
                    <label>الكمية المطلوبة:</label>
                    <input type="number" id="order-qty" class="form-control" value="1" min="1" max="${p.qty}">
                </div>
                
                <hr style="border:0; border-top:1px solid var(--border-light); margin: 20px 0;">

                <button class="btn btn-cart" onclick="addFromFormToCart(${p.id})">
                    <i class="fa-solid fa-cart-plus"></i> إضافة للسلة (لطلب المزيد لاحقاً)
                </button>
                <button class="btn btn-whatsapp" onclick="confirmDirectOrder(${p.id})">
                    <i class="fa-brands fa-whatsapp"></i> تأكيد الطلب وإرسال واتساب
                </button>
            `;
            navigate('order-form');
        }

        function addFromFormToCart(id) {
            const p = products.find(x => x.id === id);
            let size = document.getElementById('order-size').value;
            let color = document.getElementById('order-color').value;
            let qty = parseInt(document.getElementById('order-qty').value);

            if (isNaN(qty) || qty < 1 || qty > p.qty) {
                alert("يرجى إدخال كمية صحيحة ومتاحة!"); return;
            }

            cart.push({ ...p, selSize: size, selColor: color, selQty: qty });
            localStorage.setItem('am_cart', JSON.stringify(cart));
            updateCartBadge();
            
            alert("تمت الإضافة للسلة بنجاح!");
            goBack(); 
        }

        function confirmDirectOrder(id) {
            const p = products.find(x => x.id === id);
            let size = document.getElementById('order-size').value;
            let color = document.getElementById('order-color').value;
            let qty = parseInt(document.getElementById('order-qty').value);

            if (isNaN(qty) || qty < 1 || qty > p.qty) {
                alert("يرجى إدخال كمية صحيحة ومتاحة!"); return;
            }

            let msg = `مرحباً A&M Store، أود طلب:\n\nالمنتج: ${p.name}\nاللون: ${color}\nالمقاس: ${size}\nالعدد: ${qty} قطعة\n\nشكراً لكم.`;
            window.open(`https://wa.me/${SELLER_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function renderCart() {
            const c = document.getElementById('cart-items');
            c.innerHTML = cart.length ? cart.map((item, i) => `
                <div class="info-bar" style="margin-bottom:15px; padding: 10px;">
                    <img src="${item.img}" style="width:65px; height:65px; border-radius:10px; object-fit:cover;">
                    <div style="flex:1; margin: 0 15px;">
                        <strong style="font-size:1rem;">${item.name}</strong><br>
                        <small style="color:var(--text-muted); font-size:0.85rem;">
                            اللون: ${item.selColor} | المقاس: ${item.selSize} | <strong style="color:var(--text-dark)">العدد: ${item.selQty}</strong>
                        </small>
                    </div>
                    <i class="fa-solid fa-trash" style="color:#e74c3c; cursor:pointer; font-size:1.2rem; padding:10px;" onclick="removeFromCart(${i})"></i>
                </div>`).join('') : '<p style="text-align:center; color:var(--text-muted)">السلة فارغة، قم بإضافة منتجات أولاً.</p>';
        }

        function removeFromCart(i) { 
            cart.splice(i, 1); 
            localStorage.setItem('am_cart', JSON.stringify(cart)); 
            updateCartBadge(); 
            renderCart(); 
        }
        
        function checkoutCart() {
            if(!cart.length) return;
            let msg = `مرحباً A&M Store، هذا طلبي من السلة:\n\n`;
            msg += cart.map((item, i) => `${i+1}- ${item.name}\n   (لون: ${item.selColor} / مقاس: ${item.selSize} / عدد: ${item.selQty})`).join('\n\n');
            window.open(`https://wa.me/${SELLER_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        updateCartBadge(); 
        renderHomeSlider();
    </script>
</body>
</html>
